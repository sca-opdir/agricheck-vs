name: Automated Tests

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'tests/**'
      - 'requirements.txt'

jobs:
  discover-tests:
    runs-on: ubuntu-latest
    outputs:
      test_files: ${{ steps.set-matrix.outputs.files }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find test files
        id: set-matrix
        run: |
          FILES=$(find tests -type f -name "test_*.py" | jq -R -s -c 'split("\n")[:-1]')
          echo "files=$FILES" >> $GITHUB_OUTPUT

  run-tests:
    needs: discover-tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test_file: ${{ fromJson(needs.discover-tests.outputs.test_files) }}
        
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ${{ matrix.test_file }}
        run: |
          pytest ${{ matrix.test_file }} -v