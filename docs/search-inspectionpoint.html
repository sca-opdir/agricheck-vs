<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agricheck - Recherche</title>
  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

  <div class="container py-5">
    <div class="mb-4">
      <a href="index.html" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> <span data-i18n="searchPage.back">Retour à l'accueil</span>
      </a>
    </div>

    <h1 class="mb-4" data-i18n="searchPage.title">Recherche directe dans LINDAS</h1>
    <p class="text-muted" data-i18n="searchPage.help">Saisissez un mot-clé dans la langue active du site. La recherche scanne les titres et descriptions.</p>

    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <div class="input-group">
          <input type="text" id="keywordInput" class="form-control form-control-lg" placeholder="..." autocomplete="off">
          <button id="submitSearchBtn" class="btn btn-primary btn-lg" type="button">
            <i class="bi bi-search me-2"></i><span data-i18n="searchPage.button">Rechercher</span>
          </button>
        </div>
      </div>
    </div>

    <div id="searchStatus" class="text-center d-none my-4">
      <div class="spinner-border text-primary" role="status"></div>
      <div class="mt-2 text-muted" data-i18n="searchPage.loading">Interrogation des serveurs fédéraux...</div>
    </div>
    <div id="errorMessage" class="alert alert-danger d-none" role="alert"></div>

    <div class="card shadow-sm d-none" id="resultsCard">
      <div class="card-header bg-white fw-bold">
        <span data-i18n="searchPage.results">Résultats trouvés</span> (<span id="matchCount">0</span>)
      </div>
      <div class="table-responsive">
        <table class="table table-hover table-striped mb-0">
          <thead class="table-dark">
            <tr>
              <th data-i18n="searchPage.thHierarchy">Hiérarchie</th>
              <th>Code full</th>
              <th>Code</th>
              <th data-i18n="searchPage.thPoint">Point de contrôle</th>
              <th>Description</th>
              <th class="text-center">Lien</th>
            </tr>
          </thead>
          <tbody id="resultsTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script src="js/layout.js"></script> 
  <script src="js/search-inspectionpoint.js"></script>
</body>
</html>
