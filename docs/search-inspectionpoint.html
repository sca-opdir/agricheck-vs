<!DOCTYPE html>
<html lang="fr" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agricheck Valais - Recherche</title>
  <link rel="icon" href="resources/icon.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jstree@3.3.14/dist/themes/default/style.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="d-flex flex-column min-vh-100">

  <main class="container-lg flex-grow-1 py-5" data-aos="fade-up">
    
    <div class="mb-4">
      <a href="index.html" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> <span data-i18n="searchPage.back">...</span>
      </a>
    </div>

    <h1 class="mb-4" data-i18n="searchPage.title">...</h1>
    <p class="text-muted" data-i18n="searchPage.help">...</p>

    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <div class="input-group">
          <input type="text" id="keywordInput" class="form-control form-control-lg" data-i18n-placeholder="searchPage.placeholder" autocomplete="off">
          <button id="submitSearchBtn" class="btn btn-primary btn-lg" type="button">
            <i class="bi bi-search me-2"></i><span data-i18n="searchPage.button">...</span>
          </button>
        </div>
      </div>
    </div>

    <div id="searchStatus" class="text-center d-none my-4">
      <div class="spinner-border text-primary" role="status"></div>
      <div class="mt-2 text-muted" data-i18n="searchPage.loading">...</div>
    </div>
    <div id="errorMessage" class="alert alert-danger d-none" role="alert"></div>

    <div class="card shadow-sm d-none" id="resultsCard">
      <div class="card-header bg-white fw-bold">
        <span data-i18n="searchPage.results">...</span> (<span id="matchCount">0</span>)
      </div>
      <div class="table-responsive">
        <table class="table table-hover table-striped mb-0">
          <thead class="table-dark">
            <tr>
              <th data-i18n="searchPage.thHierarchy">...</th>
              <th>Code full</th>
              <th>Code</th>
              <th data-i18n="searchPage.thPoint">...</th>
              <th data-i18n="searchPage.thDescription">Description</th>
              <th class="text-center" data-i18n="searchPage.thLink">Lien</th>
            </tr>
          </thead>
          <tbody id="resultsTableBody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script>AOS.init({ once: true });</script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.1/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script src="js/layout.js"></script> 
  <script src="js/search-inspectionpoint.js"></script>

  <script>
    if (window.__i18nReady) {
      window.__i18nReady.then(() => {
        if (typeof window.applyTranslations === 'function') {
          window.applyTranslations();
          
          // Traduction spécifique du placeholder
          const inputEl = document.getElementById('keywordInput');
          if (inputEl && typeof window.t === 'function') {
            inputEl.placeholder = window.t('searchPage.placeholder') || "Saisissez un mot-clé...";
          }
        }
      });
    }
  </script>
</body>
</html>
