<!DOCTYPE html>
<html lang="fr" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agricheck Valais - t-SNE</title>
  <link rel="icon" href="resources/icon.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  
  <script src="https://cdn.jsdelivr.net/npm/plotly.js-dist@2.24.1/plotly.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="d-flex flex-column min-vh-100">

  <main class="container-lg flex-grow-1 py-5" data-aos="fade-up">
    
    <div class="mb-4">
      <a href="index.html" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> <span data-i18n="searchPage.back">Retour à l'accueil</span>
      </a>
    </div>

    <h1 class="mb-2">Cartographie Sémantique t-SNE</h1>
    <p class="text-muted mb-4">Visualisation en 2D de la proximité sémantique entre les points de contrôle.</p>

    <div class="card shadow-sm mb-4" style="max-width: 500px;">
      <div class="card-body d-flex align-items-center gap-3 py-2">
        <label for="colorDimension" class="fw-bold mb-0" style="white-space: nowrap;">Niveau de couleur :</label>
        <select id="colorDimension" class="form-select">
          <option value="Niveau 1">Niveau 1 (Global)</option>
          <option value="Niveau 2" selected>Niveau 2 (Intermédiaire)</option>
          <option value="Niveau 3">Niveau 3 (Détaillé)</option>
        </select>
      </div>
    </div>

    <div class="card shadow-sm mb-5">
      <div class="card-body p-1">
        <div id="tsne-div" style="width:100%; height:720px;"></div>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script>AOS.init({ once: true });</script>
  
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script src="js/layout.js"></script> 
<script>
    const csvUrl = '../data/points_de_contrôle_2026-05-20_addedKeywords_embeddings_tsneviz.csv';
    let rawData = [];

    // 1. Charger et parser le CSV automatiquement avec nettoyage des en-têtes
    Papa.parse(csvUrl, {
      download: true,
      header: true,
      delimiter: ";",
      skipEmptyLines: true,
      // Supprime les espaces invisibles dans les noms de colonnes (ex: "x " devient "x")
      beforeFirstChunk: function(chunk) {
        let lines = chunk.split(/\r\n|\n/);
        if (lines.length > 0) {
          lines[0] = lines[0].replace(/;\s+/g, ';').replace(/\s+;/g, ';').trim();
        }
        return lines.join('\n');
      },
      complete: function(results) {
        // Validation et filtrage tolérant des coordonnées x et y
        rawData = results.data.filter(row => {
          return row.x !== undefined && row.x !== null && row.x !== '' &&
                 row.y !== undefined && row.y !== null && row.y !== '';
        });

        if (rawData.length === 0) {
          console.error("Aucune donnée valide trouvée. Vérifie les en-têtes de colonnes 'x' et 'y' dans le CSV.");
        } else {
          // Affichage initial au Niveau 2
          updateGraph("Niveau 2");
        }
      }
    });

    // 2. Écouter les changements du menu déroulant
    document.getElementById('colorDimension').addEventListener('change', function(e) {
      updateGraph(e.target.value);
    });

    // 3. Fonction de mise à jour dynamique du graphique
    function updateGraph(dimension) {
      const groups = {};

      rawData.forEach(row => {
        let groupKey = row[dimension] ? row[dimension].trim() : "Non classifié";
        if (groupKey === "" || groupKey === "nan") groupKey = "Non classifié";

        if (!groups[groupKey]) {
          groups[groupKey] = { x: [], y: [], text: [], hierarchy: [], tags: [] };
        }
        
        groups[groupKey].x.push(parseFloat(row.x));
        groups[groupKey].y.push(parseFloat(row.y));
        groups[groupKey].text.push(row.label || row.point); 
        groups[groupKey].hierarchy.push(row.hierarchy || '');
        // Correction ici : row.tags au lieu de row.Tags (minuscule dans ton CSV)
        groups[groupKey].tags.push(row.tags || row.Tags || '-');
      });

      const traces = Object.keys(groups).map(key => {
        return {
          x: groups[key].x,
          y: groups[key].y,
          mode: 'markers',
          type: 'scatter',
          name: key,
          text: groups[key].text,
          customdata: groups[key].hierarchy.map((h, idx) => [h, groups[key].tags[idx]]),
          hovertemplate: '<b>%{text}</b><br><br><b>Hiérarchie :</b> %{customdata[0]}<br><b>Tags :</b> %{customdata[1]}<extra></extra>',
          marker: { size: 6, opacity: 0.7 }
        };
      });

      const layout = {
        plot_bgcolor: 'white',
        margin: { l: 20, r: 20, b: 20, t: 20 },
        xaxis: { showgrid: true, gridcolor: '#f0f0f0', zeroline: false },
        yaxis: { showgrid: true, gridcolor: '#f0f0f0', zeroline: false },
        hovermode: 'closest',
        legend: { font: { size: 10 } }
      };

      Plotly.newPlot('tsne-div', traces, layout, { responsive: true });
    }
  </script>
</body>
</html>
