<!DOCTYPE html>
<html lang="fr" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agricheck Valais - t-SNE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/plotly.js-dist@2.24.1/plotly.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="d-flex flex-column min-vh-100">

  <main class="container-lg flex-grow-1 py-5">
    <h1 data-i18n="tsne.title">Cartographie Sémantique t-SNE</h1>
    
    <div class="card shadow-sm mb-4" style="max-width: 500px;">
      <div class="card-body d-flex align-items-center gap-3 py-2">
        <label for="colorDimension" class="fw-bold mb-0" data-i18n="tsne.colormap">Code couleur :</label>
        <select id="colorDimension" class="form-select">
          <option value="Niveau 1" data-i18n="tsne.firstlevel">Niveau 1</option>
          <option value="Niveau 2" selected data-i18n="tsne.secondlevel">Niveau 2</option>
          <option value="Niveau 3" data-i18n="tsne.thirdlevel">Niveau 3</option>
        </select>
      </div>
    </div>

    <div id="tsne-div" style="width:100%; height:600px;" class="border rounded shadow-sm bg-white"></div>

    <div class="mt-4 border p-3 bg-light rounded">
      <h5>Debug :</h5>
      <div id="csv-status" class="badge bg-secondary">Chargement...</div>
    </div>
  </main>

  <script src="js/layout.js"></script> 
  <script>
    // URL directe vers votre fichier CSV à la racine du dépôt
    const csvUrl = '../data/points_de_contrôle_2026-05-20_addedKeywords_embeddings_tsneviz.csv';
    let rawData = [];

    Papa.parse(csvUrl, {
      download: true,
      header: true,
      delimiter: ";",
      skipEmptyLines: true,
      transformHeader: function(h) { return h.trim(); }, // Nettoie les espaces dans les titres
      complete: function(results) {
        // Filtrage strict : on garde uniquement les lignes avec x et y valides
        rawData = results.data.filter(row => {
          const x = parseFloat(row.x);
          const y = parseFloat(row.y);
          return !isNaN(x) && !isNaN(y);
        });

        if (rawData.length > 0) {
          document.getElementById('csv-status').textContent = rawData.length + " points valides chargés.";
          document.getElementById('csv-status').className = "badge bg-success";
          updateGraph("Niveau 2");
        } else {
          document.getElementById('csv-status').textContent = "Erreur : Aucune donnée valide (x,y) trouvée.";
          document.getElementById('csv-status').className = "badge bg-danger";
        }
      }
    });

    document.getElementById('colorDimension').addEventListener('change', (e) => updateGraph(e.target.value));

    function updateGraph(dimension) {
      const groups = {};

      rawData.forEach(row => {
        let groupKey = (row[dimension] && row[dimension] !== "nan") ? row[dimension].trim() : "Non classifié";

        if (!groups[groupKey]) groups[groupKey] = { x: [], y: [], text: [] };
        
        groups[groupKey].x.push(parseFloat(row.x));
        groups[groupKey].y.push(parseFloat(row.y));
        groups[groupKey].text.push(row.label || row.point || "");
      });

      const traces = Object.keys(groups).map(key => ({
        x: groups[key].x,
        y: groups[key].y,
        mode: 'markers',
        type: 'scatter',
        name: key,
        text: groups[key].text,
        marker: { size: 6 }
      }));

      Plotly.newPlot('tsne-div', traces, {
        margin: { t: 0, r: 0, l: 0, b: 0 },
        hovermode: 'closest'
      });
    }
  </script>
</body>
</html>
