<!DOCTYPE html>
<html lang="fr" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agricheck Valais - t-SNE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/plotly.js-dist@2.24.1/plotly.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="d-flex flex-column min-vh-100">

  <main class="container-lg flex-grow-1 py-5">
    <div class="mb-4"><a href="index.html" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i> Retour</a></div>

    <h1 class="mb-2">Cartographie Sémantique t-SNE</h1>

    <div class="card shadow-sm mb-4" style="max-width: 500px;">
      <div class="card-body d-flex align-items-center gap-3 py-2">
        <label id="labelColorDimension" for="colorDimension" class="fw-bold mb-0">Code couleur :</label>
        <select id="colorDimension" class="form-select">
          <option value="Niveau 1">Niveau 1</option>
          <option value="Niveau 2" selected>Niveau 2</option>
          <option value="Niveau 3">Niveau 3</option>
        </select>
      </div>
    </div>

    <div class="card shadow-sm mb-5">
      <div class="card-body p-1">
        <div id="tsne-div" style="width:100%; height:720px;"></div>
      </div>
    </div>

    <div class="card shadow-sm mb-5 border-warning">
      <div class="card-header bg-warning text-dark fw-bold">
        <i class="bi bi-bug"></i> Inspecteur de Données CSV (Debug) 
        <span id="csv-status" class="badge bg-dark">Chargement...</span>
      </div>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-sm table-striped table-bordered mb-0" id="debugTable">
            <thead class="table-dark small">
              <tr id="debugHeader"><th>Statut</th></tr>
            </thead>
            <tbody id="debugBody" class="small">
              <tr><td class="text-muted text-center py-3">Chargement en cours...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script>
    const csvUrl = 'https://raw.githubusercontent.com/sca-opdir/agricheck-vs/main/data/points_de_contr%C3%B4le_2026-05-20_addedKeywords_embeddings_tsneviz.csv';
    let rawData = [];

    Papa.parse(csvUrl, {
      download: true,
      header: true,
      delimiter: ";",
      skipEmptyLines: true,
      transformHeader: h => h.trim(),
      complete: function(results) {
        rawData = results.data.filter(row => row.x && row.y);
        document.getElementById('csv-status').textContent = rawData.length + " lignes";
        document.getElementById('csv-status').className = "badge bg-success";
        
        generateDebugTable(results.data);
        updateGraph("Niveau 2");
      }
    });

    function generateDebugTable(allRows) {
      if (!allRows.length) return;
      const headers = Object.keys(allRows[0]);
      const headerRow = document.getElementById('debugHeader');
      const tbody = document.getElementById('debugBody');
      
      headerRow.innerHTML = headers.map(h => `<th>${h}</th>`).join('');
      tbody.innerHTML = allRows.slice(0, 5).map(row => 
        `<tr>${headers.map(h => `<td>${row[h] || ''}</td>`).join('')}</tr>`
      ).join('');
    }

    function updateGraph(dimension) {
      const groups = {};
      rawData.forEach(row => {
        let key = (row[dimension] && row[dimension] !== "nan") ? row[dimension].trim() : "Non classifié";
        if (!groups[key]) groups[key] = { x: [], y: [], text: [] };
        groups[key].x.push(parseFloat(row.x));
        groups[key].y.push(parseFloat(row.y));
        groups[key].text.push(row.label || "");
      });

      const traces = Object.keys(groups).map(key => ({
        x: groups[key].x, y: groups[key].y, mode: 'markers', name: key, type: 'scatter', text: groups[key].text
      }));

      Plotly.newPlot('tsne-div', traces, { margin: { t: 20, l: 20, r: 20, b: 20 }, hovermode: 'closest' }, { responsive: true });
    }

    document.getElementById('colorDimension').addEventListener('change', (e) => updateGraph(e.target.value));
  </script>
</body>
</html>
