<!DOCTYPE html>
<html lang="de" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agricheck</title>
  <link rel="icon" href="resources/icon.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jstree@3.3.14/dist/themes/default/style.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="d-flex flex-column min-vh-100">
  <header class="bg-light border-bottom py-5 mb-4" data-aos="fade-down">
    <div class="container-lg">
      <h1 class="display-5 fw-bold mb-3" data-i18n="header.title">
        Schweizer Kontrollpunkte? Einfach gefunden mit Agricheck! >>> Version WALLIS
      </h1>
      <div class="lead mb-0" data-i18n="header.lead"></div>
    </div>
  </header>
  <main class="container-lg flex-grow-1" data-aos="fade-up">
    <div data-i18n="tree.quickHelp" class="mb-3"></div>
    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <div class="row g-2 align-items-center">
          <div class="col-12 col-lg-9">
            <div class="input-group">
              <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
              <input id="search"
                     class="form-control"
                     type="search"
                     placeholder="Stichwort eingeben …"
                     autocomplete="off"
                     data-i18n-placeholder="search.placeholder">
            </div>
          </div>
          <div class="col-12 col-lg-3 d-grid">
            <button id="searchBtn" class="btn btn-outline-primary">
              <span data-i18n="search.button">Suche</span>
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="row g-4">
      <div class="col-12 col-lg-9">
        <div class="card shadow-sm h-100">
          <div class="card-header bg-white fw-semibold" data-i18n="tree.cardTitle">Kontrollpunkte-Gruppen</div>
          <div class="card-body pt-3"><div id="tree"></div></div>
        </div>
      </div>
      <div class="col-12 col-lg-3">
        <div id="actionsWrapper">
          <div class="card shadow-sm" id="actionsCard">
            <div class="card-header bg-white fw-semibold d-flex align-items-center">
              <i class="bi bi-gear-fill me-2"></i><span data-i18n="actions.title">Aktionen</span>
            </div>
            <div class="card-body d-grid gap-3">
              <button id="generate" class="btn btn-primary btn-lg" disabled>
                <i class="bi bi-list-check me-2"></i><span data-i18n="actions.generate">Liste erstellen</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jstree@3.3.14/dist/jstree.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lunr/lunr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script>AOS.init({ once: true });</script>

  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.1/marked.min.js"></script>

  <script src="js/layout.js"></script>
  <script type="module" src="js/index.js"></script>
</body>
</html>
