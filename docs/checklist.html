<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agricheck</title>
  <link rel="icon" href="resources/icon.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jstree@3.3.14/dist/themes/default/style.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.1/marked.min.js"></script>
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="d-flex flex-column min-vh-100">
  <div class="container py-4">
  <h1 class="mb-2" data-i18n="checklist.title">Meine Agricheck-Liste</h1>
    <p id="metaDate" class="text-muted mb-4"></p>
    <div id="toolbar" class="d-print-none mb-3"">
      <button id="printBtn" class="btn btn-outline-secondary me-2">
        <i class="bi bi-printer"></i>
        <span class="ms-1" data-i18n="print">Drucken / PDF</span>
      </button>
      <button id="copyLinkBtn" class="btn btn-outline-secondary">
        <i class="bi bi-clipboard"></i>
        <span class="ms-1" data-i18n="copyLink">Link kopieren</span>
      </button>
    </div>
    <br><br><br>
    <div id="content"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script>AOS.init({ once:true });</script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/checklist.js"></script>
  <script src="js/layout.js"></script>
</body>
</html>
