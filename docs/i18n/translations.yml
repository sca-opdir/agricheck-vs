  about: |
    # Agricheck – Ihr Schnellzugriff auf Schweizer Kontrollpunkte
    
    Agricheck ist eine Webapplikation, die Landwirt:innen digitalen Zugang zu möglichst allen relevanten Kontrollpunkten auf Schweizer Landwirtschaftsbetrieben bietet. Die Anwendung verknüpft offene Daten des Bundes und Label-Organisationen.
    
    ## Wer hat diese App umgesetzt?
    
    Das Bundesamt für Landwirtschaft hat diese Webapplikation im Jahr 2025 im Rahmen des Aktionsplans «Kontrollen auf Landwirtschaftsbetrieben» erarbeitet. Er ist in Zusammenarbeit mit unterzeichnenden Organisationen des Aktionsplans entstanden.
    
    Zu berücksichtigen sind folgende Punkte:
    
    * Die Kontrollpunkte werden einmal jährlich aktualisiert, und zwar vor dem neuen Kalenderjahr.
    * Eher unbedeutende Produktionszweige sind zugunsten der Übersichtlichkeit nicht abgebildet (z.B. Insekten).
    * Es sind Kontrollpunkte von Labels abgebildet, welche den Aktionsplan Kontrollen in der Landwirtschaft unterzeichnet haben, sofern sie ihre Kontrollpunkte-Listen zur Verfügung gestellt haben. Kontrollpunkte von weiteren privatrechtlichen Organisationen könnten künftig ergänzt werden.
    * Es wurden die Texte aus den Kontrollpunkte-Listen übernommen. Die Hilfstexte sind für Kontrolleure geschrieben worden und können deshalb für andere Personen nicht immer selbsterklärend sein.
    * Sind die Kontrollpunkte in einer Sprache nicht verfügbar bzw. übersetzt, so werden sie in einer verfügbaren Sprachversion abgebildet.
    * Die Herausgeber übernehmen keine Verantwortung für die Vollständigkeit, Verständlichkeit und Korrektheit der privatrechtlichen Kontrollpunktelisten.
    
    Wenden Sie sich bei Fragen an [acontrol@blw.admin.ch](mailto:acontrol@blw.admin.ch).

  terms-of-use: |
    ### Nutzungsbedingungen
    
    <img alt="Terms of Use: Free Use, Source Mandatory, Commercial Use by Permission" src="https://wp.opendata.swiss/wp-content/uploads/2021/02/terms_by-ask.png" style="height:30px;margin-bottom:10px">
    
    **Freie Nutzung. Quellenangabe ist Pflicht. Kommerzielle Nutzung nur mit Bewilligung des Datenlieferanten zulässig.**
    
    Die auf Agricheck publizierten Daten sind öffentlich einsehbar. Bitte beachten Sie jedoch:
    
    * **Keine kommerzielle Nutzung ohne Erlaubnis:** Eine Verwendung der Daten für kommerzielle Zwecke ist ohne explizite Einwilligung nicht gestattet.
    * **Zuständigkeit:** Als zuständiger Datenlieferant gilt die jeweilige Labelorganisation, welche die spezifischen Kontrollpunkte verfasst hat. Für eine Bewilligung ist direkt die entsprechende Organisation zu kontaktieren.
    * **Urheberrecht:** Alle Urheberrechte verbleiben beim Urheber. Es werden lediglich die oben genannten Nutzungsrechte eingeräumt.

