  about: |
    # Agricheck – Votre accès rapide aux points de contrôle suisses
    
    Agricheck est un application web qui offre aux agriculteurs et agricultrices un accès numérique à un maximum de points de contrôle pertinents sur les exploitations agricoles suisses. Pour ce faire, l'application associe les données de la Confédération et des organisations de labellisation à une interface utilisateur moderne.
    
    ## Qui a mis en œuvre cette application ?
    
    L'Office fédéral de l'agriculture a élaboré cette application web en 2025 dans le cadre du plan d'action « Contrôles sur les exploitations agricoles », en collaboration avec les organisations signataires de ce plan.
    
    Les points suivants sont à prendre en considération :
    
    * Les points de contrôle sont mis à jour une fois par an, avant le début de la nouvelle année civile.
    * Certaines branches de production plutôt mineures ne sont pas représentées pour des raisons de clarté (par ex. les insectes).
    * Les points de contrôle des labels qui ont signé le plan d'action « Contrôles dans l'agriculture » sont représentés (pour autant qu'ils aient été mis à disposition). Les points de contrôle d'autres organisations de droit privé pourraient être ajoutés à l'avenir.
    * Les textes ont été repris des listes de points de contrôle. Les textes d'aide ont été rédigés pour les contrôleurs et peuvent donc ne pas être toujours explicites pour d'autres personnes.
    * Si les points de contrôle ne sont pas disponibles ou traduits dans une langue donnée, ils s'affichent dans une version linguistique disponible.
    * Les éditeurs n'assument aucune responsabilité quant à l'exhaustivité, la clarté et l'exactitude des listes de points de contrôle.
    
    Pour toute question, veuillez vous adresser à [acontrol@blw.admin.ch](mailto:acontrol@blw.admin.ch).

  terms-of-use: |
