  footerText: © Ufficio federale dell'agricoltura e organizzazioni di label partecipanti, stato febbraio 2026
  
  about: |
    # Agricheck – Il tuo accesso rapido ai punti di controllo svizzeri
    
    Agricheck è un'applicazione web che offre agli agricoltori e alle agricoltrici un accesso digitale al maggior numero possibile di punti di controllo rilevanti nelle aziende agricole svizzere. A tal fine, l'applicazione combina i dati aperti della Confederazione e delle organizzazioni di certificazione con un'interfaccia utente moderna.
    
    ## Chi ha realizzato questa applicazione?
    
    L'Ufficio federale dell'agricoltura ha sviluppato questa questa applicazione web nel 2025 nell'ambito del piano d'actione «Controlli sulle aziende agricole», in collaborazione con le organizzazioni firmatarie di tale piano.
    
    È necessario tenere conto dei seguenti punti:
    
    * I punti di controllo vengono aggiornati una volta all'anno, prima dell'inizio del nuovo anno civile.
    * Alcuni settori di attività piuttosto minori non sono rappresentati per motivi di chiarezza (ad es. gli insetti).
    * Sono rappresentati i punti di controllo dei marchi che hanno sottoscritto il piano d'azione «Controlli in agricoltura», a condizione che abbiano messo a disposizione i loro elenchi di punti di controllo. In futuro potrebbero essere aggiunti i punti di controllo di altre organizzazioni di diritto privato. I testi sono stati ripresi dagli elenchi dei punti di controllo. I testi di aiuto sono stati redatti per i controllori e potrebbero quindi non essere sempre chiari per altre persone.
    * Se i punti di controllo non sono disponibili o tradotti in una determinata lingua, vengono visualizzati in una versione linguistica disponibile.
    * Gli editori non si assumono alcuna responsabilità per la completezza, la chiarezza e l'accuratezza degli elenchi di punti di controllo.
    
    Per qualsiasi domanda, si prega di contattare [acontrol@blw.admin.ch](mailto:acontrol@blw.admin.ch).

  terms-of-use: |
    ### Condizioni d'uso
    
    <img alt="Condizioni d'uso: uso gratuito, fonte obbligatoria, uso commerciale previa autorizzazione" src="https://wp.opendata.swiss/wp-content/uploads/2021/02/terms_by-ask.png" style="height:30px;margin-bottom:10px">
    
    **Uso gratuito. È obbligatorio citare la fonte. L'uso commerciale è consentito solo previa autorizzazione del fornitore dei dati.**
    
    I dati pubblicati su Agricheck sono accessibili al pubblico. Si prega tuttavia di notare quanto segue:
    
    * **Nessun uso commerciale senza autorizzazione:** l'uso dei dati per scopi commerciali non è consentito senza esplicito consenso.
    * **Competenza:** il fornitore dei dati competente è l'organisatione di certificazione che ha redatto i punti di controllo specifici. Per ottenere l'autorizzazione è necessario contattare direttamente l'organisatione in questione.
    * **Diritto d'autore:** Tutti i diritti d'autore rimangono in capo all'autore. Sono concessi unicamente i diritti di utilizzo summenzionati.
