    <img alt="Conditions d'utilisation : utilisation libre, source obligatoire, utilisation commerciale sur autorisation" src="https://wp.opendata.swiss/wp-content/uploads/2021/02/terms_by-ask.png" style="height:30px;margin-bottom:10px">
    
    **Utilisation libre. La mention de la source est obligatoire. L'utilisation commerciale n'est autorisée qu'avec l'accord du fournisseur des données.**
    
    Les données publiées sur Agricheck sont accessibles au public. Veuillez toutefois noter les points suivants :
    
    * **Pas d'utilisation commerciale sans autorisation :** l'utilisation des données à des fins commerciales n'est pas autorisée sans accord explicite.
    * **Responsabilité :** Le fournisseur de données responsable est l'organisation de labellisation qui a rédigé les points de contrôle spécifiques. Pour obtenir une autorisation, veuillez contacter directement l'organisation concernée.
    * **Droits d'auteur :** Tous les droits d'auteur demeurent la propriété de l'auteur. Seuls les droits d'utilisation susmentionnés sont accordés.

