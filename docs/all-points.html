<!DOCTYPE html>
<html lang="fr" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agricheck Valais</title>
  <link rel="icon" href="resources/icon.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="d-flex flex-column min-vh-100">

  <div id="loading-overlay" class="d-flex justify-content-center align-items-center">
    <div class="text-center">
      <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status"></div>
      <div class="mt-2 fw-bold text-primary" data-i18n="allPoints.loading">Chargement...</div>
    </div>
  </div>
  


<main class="container-fluid px-4 flex-grow-1" data-aos="fade-up">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 data-i18n="allPoints.title">Tous les points de contrôle</h2>
    <a href="index.html" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-arrow-left"></i> <span data-i18n="allPoints.back">Retour</span>
    </a>
  </div>
  
  <hr>

  <ul class="nav nav-tabs mb-3" id="myTab" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link active" id="query-tab" data-bs-toggle="tab" data-bs-target="#query-pane" type="button" role="tab" data-i18n="allPoints.tabSansTag">Sans tag / Up-to-date</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="csv-tab" data-bs-toggle="tab" data-bs-target="#csv-pane" type="button" role="tab" data-i18n="allPoints.tabAvecTag">Avec tag / Frozen</button>
    </li>
  </ul>

  <div class="tab-content" id="myTabContent">
    
    <div class="tab-pane fade show active" id="query-pane" role="tabpanel">
      <div class="table-responsive shadow-sm card">
        <table class="table table-striped table-hover mb-0" id="resultsTableQuery">
          <thead class="table-secondary">
            <tr>
              <th data-i18n="allPoints.thHierarchy">Hiérarchie</th>
              <th data-i18n="allPoints.thCodeFull">ID</th>
              <th data-i18n="allPoints.thCode">ID (court)</th>
              <th data-i18n="allPoints.thLabel">Libellé</th>
            </tr>
            <tr>
              <th><input type="text" class="form-control form-control-sm column-filter" data-i18n="allPoints.filter" placeholder="Filtrer..." data-col="0"></th>
              <th><input type="text" class="form-control form-control-sm column-filter" data-i18n="allPoints.filter" placeholder="Filtrer..." data-col="1"></th>
              <th><input type="text" class="form-control form-control-sm column-filter" data-i18n="allPoints.filter" placeholder="Filtrer..." data-col="2"></th>
              <th><input type="text" class="form-control form-control-sm column-filter" data-i18n="allPoints.filter" placeholder="Filtrer..." data-col="3"></th>
            </tr>
          </thead>
          <tbody id="resultsBodyQuery"></tbody>
        </table>
      </div>
    </div>

    <div class="tab-pane fade" id="csv-pane" role="tabpanel">
      <div class="table-responsive shadow-sm card">
        <table class="table table-striped table-hover mb-0" id="resultsTableCSV">
          <thead class="table-secondary">
            <tr>
              <th>Hiérarchie</th><th>Code</th><th>Libellé</th><th>Tags</th>
            </tr>
            <tr>
              <th><input type="text" class="form-control form-control-sm column-filter" data-i18n="allPoints.filter" placeholder="Filtrer..." data-col="0"></th>
              <th><input type="text" class="form-control form-control-sm column-filter" data-i18n="allPoints.filter" placeholder="Filtrer..." data-col="1"></th>
              <th><input type="text" class="form-control form-control-sm column-filter" data-i18n="allPoints.filter" placeholder="Filtrer..." data-col="2"></th>
              <th><input type="text" class="form-control form-control-sm column-filter" data-i18n="allPoints.filter" placeholder="Filtrer..." data-col="3"></th>
            </tr>
          </thead>
          <tbody id="resultsBodyCSV"></tbody>
        </table>
      </div>
    </div>
  </div> </main>
  
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script>AOS.init({ once: true });</script>

<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.1/marked.min.js"></script>

<script src="js/layout.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script type="module" src="js/all-points.js"></script>
</body>
</html>
